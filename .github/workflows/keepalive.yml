name: FreeMCHost Keepalive

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Minecraft Server
        run: |
          echo "Pinging nd6.hn21.xyz:20358..."
          echo -ne "\xFE\x01" | nc -w 5 nd6.hn21.xyz 20358 && echo "Ping OK" || echo "Ping done"
          echo "Keepalive executed at $(date)"
